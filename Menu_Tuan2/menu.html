<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <style>
        *{
            margin: 0px auto;
            padding: 0px;
        }
        .wrapper{
            height: 800px;
            width: 1089px;
            border: 2px solid black;
        }
        header{
            height: 150px;
            width: 1089px;
            border-bottom: 1px solid black;
        }
        nav{
            height: 50px;
            width: 100%;
            background-color: blanchedalmond;
            border-bottom: 1px solid black;
        }
        .menu li{
            float: left;
            height: 50px;
            width: 217px;
            list-style-type: none;
            line-height: 50px;
            text-indent: 20px;
            text-shadow: cornsilk 10px 10px 5px;
            position: relative;
        }
        li a{
            text-decoration: none;
            font-weight: bolder;
            color: black;
        }
        .menu li :hover {
            background-color: coral;
        }
        .menu li :hover> a {
            font-style: italic;
            color: yellow;
        }
        
        .menu li .menu2 {
            position: absolute; 
            display: none;
        }
        .menu li :hover>.menu2 {
            display: block;
            background-color: rgb(55, 176, 176);
        }
    </style>
</head>
<body>
     <div class="wrapper">
        <header>
            <img src="../Menu_Tuan2/welding-8445458_1280.jpg" alt="" style="height: 150px;width: 100%;">
        </header>
        <nav>
            <ul class="menu">
                <li><a href="#">Home</a></li>
                <li><a href="#">T-SHIRTS</a>
                    <ul class="menu2">

                        <li><a href="#">POLO</a></li>
                        <li><a href="#">TEE</a></li>
                        <li><a href="#">JACKET</a></li>

                    </ul>
                </li>
                <li><a href="#">JEAN/SHORT</a></li>
                <li><a href="#">ACCESSORIES</a></li>
                <li><a href="#">BOTTOM</a></li>
            </ul>
        </nav>
        <div class="content">
            <aside></aside>
            <section></section>
        </div>
     </div>
</body>
</html>
